<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Randomizador de URLs - Material Orange</title>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<script src="script.js" defer></script>
</head>
<body>

<header>
	<span class="material-symbols-outlined">shuffle</span>
	<h1>Randomizador de Links</h1>
</header>

<main>
	<div class="column">
		<div class="input-wrapper">
			<textarea id="urlInput" placeholder="Cole suas URLs aqui (separadas por uma linha em branco)..."></textarea>
		</div>
	</div>

	<div class="column" id="resultsContainer">
	</div>
</main>

<button class="fab-extended" id="randomizeBtn">
	<span class="material-symbols-outlined">casino</span>
	<span>Randomizar</span>
</button>

</body>
</html>
