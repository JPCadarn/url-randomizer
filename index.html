<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gerenciador de Links - Material Orange</title>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
		  rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<script type="module" src="js/main.js"></script>
</head>
<body>

<header>
	<div class="header-left">
		<span class="material-symbols-outlined">shuffle</span>
		<h1>Gerenciador de Links</h1>
	</div>

	<div class="search-wrapper">
		<span class="material-symbols-outlined">search</span>
		<input type="text" id="searchInput" placeholder="Buscar...">
	</div>
</header>

<main>
	<div class="column">
		<div class="input-wrapper">
			<textarea id="urlInput" placeholder="Cole novas URLs aqui para adicionar à lista..."></textarea>
		</div>

		<div class="input-actions">
			<button class="btn btn-text btn-danger" id="clearBtn">
				<span class="material-symbols-outlined">delete_sweep</span>
				Limpar Lista
			</button>
			<button class="btn" id="addBtn">
				<span class="material-symbols-outlined">add</span>
				Adicionar
			</button>
		</div>
	</div>

	<div class="column">
		<div id="resultsContainer">
		</div>

		<button class="btn btn-block" id="randomizeBtn">
			<span class="material-symbols-outlined">casino</span>
			Randomizar
		</button>
	</div>
</main>

<div class="modal-overlay" id="confirmModal">
	<div class="modal">
		<div class="modal-header">
			<span class="material-symbols-outlined modal-icon">warning</span>
			<h2 class="modal-title" id="modalTitle">Confirmar</h2>
		</div>
		<div class="modal-body" id="modalBody">
			Texto de confirmação aqui.
		</div>
		<div class="modal-actions">
			<button class="btn btn-text" id="cancelActionBtn">Cancelar</button>
			<button class="btn btn-danger" id="confirmActionBtn">Confirmar</button>
		</div>
	</div>
</div>

</body>
</html>
